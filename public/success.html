<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed – CreamyBits</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f8f8f8; color: #0f0f0f; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border-radius: 24px; padding: 3.5rem 3rem; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,.08); }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; margin-bottom: .75rem; }
    p { color: #6b7280; line-height: 1.7; margin-bottom: 1.25rem; }
    .detail { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 1rem 1.25rem; font-size: .9rem; color: #166534; margin-bottom: 2rem; line-height: 1.65; }
    a { display: inline-block; background: #0f0f0f; color: #fff; text-decoration: none; padding: .85rem 2rem; border-radius: 999px; font-weight: 600; font-size: .95rem; transition: opacity .2s; }
    a:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Order Confirmed!</h1>
    <p>Thank you for your purchase. Your payment was received successfully.</p>
    <div class="detail">
      📍 Pick-up is available <strong>Saturdays &amp; Sundays</strong> in Albuquerque, NM.<br>
      We'll send the exact address and pick-up time to your email within <strong>12–24 hours</strong>.
    </div>
    <p style="font-size:.85rem">Questions? Email us at <strong>creamybitsllc@gmail.com</strong></p>
    <br>
    <a href="/">Back to Menu</a>
  </div>
</body>
</html>
