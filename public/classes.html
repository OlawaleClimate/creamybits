<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cooking Classes – CreamyBits</title>
  <meta name="description" content="Learn to make authentic African pastries with CreamyBits. Register for upcoming cooking classes in Albuquerque, NM." />
  <link rel="icon" href="/logo.png" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7B2V6H11PP"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-7B2V6H11PP');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0f0f0f; --pink: #ec4899; --gray: #6b7280; }
    body { font-family: 'DM Sans', sans-serif; background: #f8f8f8; color: var(--black); min-height: 100vh; }

    nav { background: var(--black); padding: 0 3rem; height: 70px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
    .nav-logo { display: flex; align-items: center; gap: .75rem; text-decoration: none; }
    .nav-logo img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .nav-logo span { color: #fff; font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 900; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: rgba(255,255,255,.8); text-decoration: none; font-size: .92rem; font-weight: 500; transition: color .2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    @media(max-width:640px) { nav { padding: 0 1.25rem; } .nav-links { gap: 1rem; } .nav-links a { font-size: .82rem; } }

    .hero { background: var(--black); color: #fff; padding: 4rem 2rem 3rem; text-align: center; }
    .hero-eyebrow { font-size: .78rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--pink); margin-bottom: .75rem; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; margin-bottom: .75rem; }
    .hero p { color: rgba(255,255,255,.7); font-size: 1rem; max-width: 520px; margin: 0 auto; line-height: 1.7; }

    .content { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

    .classes-grid { display: flex; flex-direction: column; gap: 1.25rem; }
    .class-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,.06); display: flex; flex-direction: column; }
    .class-card-body { padding: 1.5rem 1.75rem 1rem; flex: 1; }
    .class-badge { display: inline-flex; align-items: center; gap: .4rem; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--pink); margin-bottom: .6rem; }
    .class-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: .5rem; line-height: 1.3; }
    .class-desc { font-size: .875rem; color: var(--gray); line-height: 1.65; margin-bottom: 1rem; }
    .class-meta { display: flex; flex-wrap: wrap; gap: .5rem .85rem; font-size: .82rem; color: #374151; margin-bottom: 1.25rem; }
    .class-meta span { display: flex; align-items: center; gap: .3rem; }
    .class-card-footer { padding: 1rem 1.75rem 1.5rem; border-top: 1px solid #f3f4f6; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .class-price { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; }
    .class-spots { font-size: .8rem; color: var(--gray); }
    .class-spots.low { color: #dc2626; font-weight: 600; }
    .reg-btn { background: linear-gradient(135deg, var(--pink), #8b5cf6); color: #fff; border: none; border-radius: 12px; padding: .8rem 1.5rem; font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 700; cursor: pointer; transition: opacity .2s; white-space: nowrap; }
    .reg-btn:hover { opacity: .88; }
    .reg-btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }

    .empty { text-align: center; padding: 5rem 1rem; color: var(--gray); }
    .empty .icon { font-size: 3rem; margin-bottom: 1rem; }

    /* Registration modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,.2); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; z-index: 1; }
    .modal-header h3 { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--gray); padding: .25rem .5rem; border-radius: 8px; }
    .modal-close:hover { background: #f3f4f6; }
    .modal-body { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: .9rem; }
    .form-label { font-size: .82rem; font-weight: 700; color: #374151; margin-bottom: .3rem; display: block; }
    .form-input { width: 100%; padding: .65rem .9rem; border: 1.5px solid #e5e7eb; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: .9rem; background: #fff; transition: border-color .2s; }
    .form-input:focus { outline: none; border-color: var(--black); }
    .req { color: var(--pink); }
    .modal-footer { padding: 1rem 1.5rem 1.5rem; border-top: 1px solid #f0f0f0; }
    .pay-btn { width: 100%; background: linear-gradient(135deg, var(--pink), #8b5cf6); color: #fff; border: none; border-radius: 12px; padding: .9rem; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity .2s; }
    .pay-btn:hover:not(:disabled) { opacity: .88; }
    .pay-btn:disabled { opacity: .6; cursor: not-allowed; }
    .form-error { color: #dc2626; font-size: .82rem; margin-bottom: .5rem; display: none; }
    .class-summary { background: #f8f8f8; border-radius: 12px; padding: .85rem 1rem; font-size: .875rem; line-height: 1.6; }
    .class-summary strong { display: block; font-size: .95rem; margin-bottom: .2rem; }
  </style>
</head>
<body>

<nav aria-label="Main navigation">
  <a href="/" class="nav-logo">
    <img src="/logo.png" alt="CreamyBits logo" />
    <span>CreamyBits</span>
  </a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/menu.html">Menu</a></li>
    <li><a href="/classes.html" class="active">Classes</a></li>
    <li><a href="/luxe.html">Luxe</a></li>
  </ul>
</nav>

<div class="hero">
  <p class="hero-eyebrow">🎓 Learn to Cook</p>
  <h1>Cooking Classes</h1>
  <p>Master authentic African pastries with hands-on classes led by CreamyBits. Register below and join our community on Telegram.</p>
</div>

<div class="content">
  <div class="classes-grid" id="classesGrid">
    <div class="empty"><div class="icon">⏳</div><p>Loading classes…</p></div>
  </div>
</div>

<!-- Registration modal -->
<div class="modal-overlay" id="regModal" onclick="if(event.target===this)closeRegModal()">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="regModalTitle">
    <div class="modal-header">
      <h3 id="regModalTitle">Register for Class</h3>
      <button class="modal-close" onclick="closeRegModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="class-summary" id="regClassSummary"></div>
      <div>
        <label class="form-label" for="regName">Full Name <span class="req">*</span></label>
        <input class="form-input" id="regName" type="text" placeholder="Your full name" />
      </div>
      <div>
        <label class="form-label" for="regEmail">Email <span class="req">*</span></label>
        <input class="form-input" id="regEmail" type="email" placeholder="your@email.com" />
      </div>
      <div>
        <label class="form-label" for="regPhone">Phone <span style="color:#9ca3af;font-weight:400">(optional)</span></label>
        <input class="form-input" id="regPhone" type="tel" placeholder="(505) 000-0000" />
      </div>
    </div>
    <div class="modal-footer">
      <p class="form-error" id="regError"></p>
      <button class="pay-btn" id="regPayBtn" onclick="submitRegistration()">Pay Securely with Stripe →</button>
    </div>
  </div>
</div>

<script>
  let classes = [];
  let _selectedClass = null;

  async function loadClasses() {
    try {
      classes = await fetch('/classes').then(r => r.json());
      renderClasses();
    } catch(e) {
      document.getElementById('classesGrid').innerHTML =
        '<div class="empty"><div class="icon">⚠️</div><p>Could not load classes. Please refresh.</p></div>';
    }
  }

  function renderClasses() {
    const grid = document.getElementById('classesGrid');
    if (!classes.length) {
      grid.innerHTML = '<div class="empty"><div class="icon">📅</div><p>No classes scheduled yet.<br>Check back soon!</p></div>';
      return;
    }
    grid.innerHTML = classes.map(c => {
      const dateStr = c.classDate
        ? new Date(c.classDate + 'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})
        : null;
      const full = c.spotsLeft !== null && c.spotsLeft <= 0;
      const low  = c.spotsLeft !== null && c.spotsLeft <= 5 && c.spotsLeft > 0;
      const spotsText = c.spotsLeft === null ? null
        : full ? 'Class full'
        : low  ? `Only ${c.spotsLeft} spot${c.spotsLeft===1?'':'s'} left!`
        : `${c.spotsLeft} spots left`;
      return `<div class="class-card">
        <div class="class-card-body">
          <div class="class-badge">🎓 Cooking Class</div>
          <h2 class="class-title">${c.title}</h2>
          ${c.description ? `<p class="class-desc">${c.description}</p>` : ''}
          <div class="class-meta">
            ${dateStr ? `<span>📅 ${dateStr}</span>` : ''}
            ${c.classTime ? `<span>🕐 ${c.classTime}</span>` : ''}
            ${c.capacity ? `<span>👥 ${c.capacity} people max</span>` : ''}
          </div>
        </div>
        <div class="class-card-footer">
          <div>
            <div class="class-price">$${c.price.toFixed(2)}</div>
            ${spotsText ? `<div class="class-spots${low?' low':''}">${spotsText}</div>` : ''}
          </div>
          ${full
            ? `<button class="reg-btn" disabled>Class Full</button>`
            : `<a class="reg-btn" href="/class-detail.html?id=${c.id}" style="text-decoration:none;display:inline-flex;align-items:center">Register & Pay →</a>`
          }
        </div>
      </div>`;
    }).join('');
  }

  function openRegModal(classId) {
    _selectedClass = classes.find(c => c.id === classId);
    if (!_selectedClass) return;
    const dateStr = _selectedClass.classDate
      ? new Date(_selectedClass.classDate + 'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})
      : null;
    document.getElementById('regClassSummary').innerHTML =
      `<strong>${_selectedClass.title}</strong>` +
      (dateStr ? `📅 ${dateStr}` : '') +
      (_selectedClass.classTime ? ` · 🕐 ${_selectedClass.classTime}` : '') +
      ` · <strong>$${_selectedClass.price.toFixed(2)}</strong>`;
    document.getElementById('regName').value  = '';
    document.getElementById('regEmail').value = '';
    document.getElementById('regPhone').value = '';
    document.getElementById('regError').style.display = 'none';
    document.getElementById('regPayBtn').disabled = false;
    document.getElementById('regPayBtn').textContent = 'Pay Securely with Stripe →';
    document.getElementById('regModal').classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('regName').focus();
  }

  function closeRegModal() {
    document.getElementById('regModal').classList.remove('open');
    document.body.style.overflow = '';
    _selectedClass = null;
  }

  async function submitRegistration() {
    if (!_selectedClass) return;
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const errEl = document.getElementById('regError');
    const btn   = document.getElementById('regPayBtn');

    errEl.style.display = 'none';
    if (!name)  { errEl.textContent = 'Please enter your full name.'; errEl.style.display = 'block'; return; }
    if (!email) { errEl.textContent = 'Please enter your email.'; errEl.style.display = 'block'; return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errEl.textContent = 'Please enter a valid email.'; errEl.style.display = 'block'; return; }

    btn.disabled = true;
    btn.textContent = 'Redirecting to payment…';
    try {
      const res  = await fetch('/create-class-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ classId: _selectedClass.id, customerName: name, customerEmail: email, customerPhone: phone }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      window.location.href = data.url;
    } catch(e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Pay Securely with Stripe →';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeRegModal();
  });

  loadClasses();
</script>
</body>
</html>
