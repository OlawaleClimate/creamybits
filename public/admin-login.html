<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – CreamyBits</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0f0f0f; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border-radius: 20px; padding: 3rem 2.5rem; width: 100%; max-width: 380px; box-shadow: 0 24px 64px rgba(0,0,0,.4); text-align: center; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; margin-bottom: .25rem; }
    .sub { color: #6b7280; font-size: .85rem; margin-bottom: 2rem; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 10px; padding: .75rem 1rem; font-size: .85rem; margin-bottom: 1.25rem; display: none; }
    .error.show { display: block; }
    label { display: block; text-align: left; font-size: .85rem; font-weight: 600; margin-bottom: .4rem; color: #374151; }
    input { width: 100%; padding: .75rem 1rem; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: .95rem; font-family: 'DM Sans', sans-serif; margin-bottom: 1.25rem; }
    input:focus { outline: none; border-color: #0f0f0f; }
    button { width: 100%; background: #0f0f0f; color: #fff; border: none; padding: .9rem; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity .2s; }
    button:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🥧 CreamyBits</div>
    <div class="sub">Admin Access</div>

    <div class="error" id="errorMsg">Incorrect password. Please try again.</div>

    <form method="POST" action="/admin/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter admin password" required autofocus />
      <button type="submit">Sign In</button>
    </form>
  </div>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('errorMsg').classList.add('show');
    }
  </script>
</body>
</html>
