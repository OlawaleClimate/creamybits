<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Confirmed – CreamyBits</title>
  <meta name="description" content="Your cooking class registration is confirmed. Join the Telegram group to connect with your instructor." />
  <link rel="icon" href="/logo.png" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7B2V6H11PP"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-7B2V6H11PP');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0f0f0f; --pink: #ec4899; --gray: #6b7280; --green: #16a34a; }
    body { font-family: 'DM Sans', sans-serif; background: #f8f8f8; color: var(--black); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--black); padding: 0 3rem; height: 70px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: .75rem; text-decoration: none; }
    .nav-logo img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .nav-logo span { color: #fff; font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 900; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: rgba(255,255,255,.8); text-decoration: none; font-size: .92rem; font-weight: 500; transition: color .2s; }
    .nav-links a:hover { color: #fff; }
    @media(max-width:640px) { nav { padding: 0 1.25rem; } .nav-links { gap: 1rem; } .nav-links a { font-size: .82rem; } }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.25rem; }

    .card { background: #fff; border-radius: 24px; padding: 2.5rem 2rem; max-width: 500px; width: 100%; box-shadow: 0 4px 32px rgba(0,0,0,.08); text-align: center; }

    .check-icon { width: 72px; height: 72px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.5rem; }

    h1 { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 900; margin-bottom: .5rem; }
    .subtitle { color: var(--gray); font-size: .95rem; line-height: 1.6; margin-bottom: 1.75rem; }

    .detail-box { background: #f8f8f8; border-radius: 14px; padding: 1.1rem 1.25rem; text-align: left; margin-bottom: 1.75rem; font-size: .88rem; line-height: 1.8; }
    .detail-box strong { display: block; font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; margin-bottom: .35rem; }
    .detail-row { display: flex; align-items: center; gap: .5rem; color: #374151; }

    .telegram-btn { display: inline-flex; align-items: center; gap: .6rem; background: #229ED9; color: #fff; text-decoration: none; border-radius: 14px; padding: 1rem 1.75rem; font-size: 1rem; font-weight: 700; font-family: 'DM Sans', sans-serif; transition: opacity .2s; margin-bottom: 1rem; width: 100%; justify-content: center; }
    .telegram-btn:hover { opacity: .88; }
    .telegram-btn svg { flex-shrink: 0; }

    .back-link { display: block; color: var(--gray); font-size: .875rem; text-decoration: none; margin-top: .5rem; }
    .back-link:hover { color: var(--black); }

    .spinner { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 3rem 1rem; color: var(--gray); }
    .spinner-ring { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: var(--pink); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 14px; padding: 1.25rem; color: #dc2626; font-size: .9rem; line-height: 1.6; }
  </style>
</head>
<body>

<nav aria-label="Main navigation">
  <a href="/" class="nav-logo">
    <img src="/logo.png" alt="CreamyBits logo" />
    <span>CreamyBits</span>
  </a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/menu.html">Menu</a></li>
    <li><a href="/classes.html">Classes</a></li>
    <li><a href="/luxe.html">Luxe</a></li>
  </ul>
</nav>

<div class="page">
  <div class="card" id="mainCard">
    <div class="spinner">
      <div class="spinner-ring"></div>
      <p>Loading your confirmation…</p>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const regId  = params.get('reg_id');

  async function init() {
    const card = document.getElementById('mainCard');
    if (!regId) {
      card.innerHTML = `<div class="error-box">Invalid confirmation link. Please check your email for the correct link.</div>`;
      return;
    }
    try {
      const res  = await fetch(`/class-registration/${regId}/telegram`);
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 402) {
          card.innerHTML = `<div class="error-box">⏳ Payment not yet confirmed. Please wait a moment and refresh the page. If this persists, contact us at creamybitsllc@gmail.com.</div><a class="back-link" href="/classes.html" style="margin-top:1.25rem;display:block">← Back to Classes</a>`;
        } else {
          card.innerHTML = `<div class="error-box">${data.error || 'Something went wrong.'}</div>`;
        }
        return;
      }

      const { telegramLink, classTitle, classDate, classTime, customerName } = data;
      const dateStr = classDate
        ? new Date(classDate + 'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})
        : null;

      card.innerHTML = `
        <div class="check-icon">✅</div>
        <h1>You're registered!</h1>
        <p class="subtitle">Your payment is confirmed${customerName ? `, ${customerName.split(' ')[0]}` : ''}. Join the Telegram group below to get class updates and connect with your instructor.</p>
        <div class="detail-box">
          <strong>${classTitle}</strong>
          ${dateStr ? `<div class="detail-row">📅 ${dateStr}</div>` : ''}
          ${classTime ? `<div class="detail-row">🕐 ${classTime}</div>` : ''}
        </div>
        <a class="telegram-btn" href="${telegramLink}" target="_blank" rel="noopener noreferrer">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.069l-1.97 9.285c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.08 13.63 4.117 12.7c-.652-.204-.665-.652.136-.965l10.88-4.195c.544-.197 1.02.132.429 2.529z"/></svg>
          Join Telegram Group →
        </a>
        <p style="font-size:.78rem;color:var(--gray);margin-bottom:1rem">Keep this page bookmarked — it's how you access the group link.</p>
        <a class="back-link" href="/classes.html">← Browse more classes</a>
      `;
    } catch(e) {
      card.innerHTML = `<div class="error-box">Could not load your confirmation. Please refresh or contact creamybitsllc@gmail.com.</div>`;
    }
  }

  init();
</script>
</body>
</html>
